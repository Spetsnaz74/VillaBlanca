* {
    margin: 0;
    padding: 0;

}

body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
}

h1 {
    text-align: center;
    padding: 50px 20px;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url("remedios.jpg") center/cover no-repeat;
    text-shadow: 3px 3px 6px #000;
    font-size: clamp(24px, 6vw, 36px);
    font-weight: 800;
    border-bottom: 2px solid #ff9800;
}

.search {
    display: flex;
    justify-content: center;
    padding: 28px 16px 20px;
}

.search input {
    padding: 14px 20px;
    width: 340px;
    max-width: 85%;
    border-radius: 60px;
    border: none;
    background: #1e1e1e;
    color: white;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    border: 1px solid #333;
    transition: all 0.2s;
}

.search input:focus {
    border-color: #ff9800;
    background: #252525;
}

.filters {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    padding: 8px 16px 20px;
}

.filters button {
    padding: 9px 22px;
    border: none;
    border-radius: 40px;
    background: #1f1f1f;
    color: #e0e0e0;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    transition: 0.2s;
}

.filters button:hover {
    background: #2d2d2d;
    transform: translateY(-2px);
}

.filters button.active {
    background: #ff9800;
    color: #0a0a0a;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(255,152,0,0.3);
}

.productos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    padding: 20px 24px 40px;
    max-width: 1500px;
    margin: 0 auto;
}

.producto {
    background: #151515;
    padding: 16px 14px 18px;
    border-radius: 24px;
    text-align: center;
    transition: all 0.25s ease;
    border: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
}

.producto:hover {
    transform: translateY(-6px);
    border-color: #ff9800;
    box-shadow: 0 18px 30px -12px rgba(0,0,0,0.6);
}

.image-container {
    width: 100%;
    height: 240px;
    background: #0c0c0c;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 10px;
}

.producto img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    transition: transform 0.2s ease;
}

.producto:hover img {
    transform: scale(1.03);
}

.producto h3 {
    font-weight: 700;
    font-size: 16px;
    margin: 14px 0 6px;
    color: #fff;
    line-height: 1.35;
    min-height: 44px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.producto p {
    font-size: 20px;
    font-weight: 800;
    color: #ffb347;
    background: rgba(255,152,0,0.12);
    display: inline-block;
    padding: 5px 14px;
    border-radius: 40px;
    margin: 8px auto 6px;
}

.producto small {
    font-size: 10px;
    font-weight: 600;
    color: #aaa;
    background: #262626;
    padding: 4px 12px;
    border-radius: 40px;
    display: inline-block;
    margin: 8px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Botón Comprar: logo y texto centrados, SIN fondo blanco en el logo */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    padding: 10px 16px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 60px;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.2s;
    width: 100%;
    border: none;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.02);
    background: #1ebc5a;
}

/* Logo WhatsApp: sin fondo blanco, solo la imagen original */
.btn img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    display: inline-block;
}

.no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    font-size: 18px;
    color: #aaa;
}

@media (max-width: 560px) {
    .productos {
        gap: 14px;
        padding: 12px;
    }
    .producto h3 {
        font-size: 14px;
        min-height: 40px;
    }
    .producto p {
        font-size: 17px;
    }
    .btn {
        font-size: 12px;
        padding: 8px 12px;
    }
    .btn img {
        width: 18px;
        height: 18px;
    }
}
</style>

// ========== CATEGORÍAS AUTOMÁTICAS ==========
function getUniqueCategories() {
    let catsSet = new Set();
    productos.forEach(p => catsSet.add(p.cat));
    return ["Todos", ...Array.from(catsSet).sort()];
}

let currentCategory = "Todos";
let categoriesList = getUniqueCategories();

function loadButtons() {
    const box = document.getElementById("categoryButtons");
    box.innerHTML = "";
    categoriesList.forEach(cat => {
        let btn = document.createElement("button");
        btn.textContent = cat;
        btn.onclick = () => {
            currentCategory = cat;
            applyFilters();
            document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
        box.appendChild(btn);
    });
    document.querySelector('.filters button')?.classList.add('active');
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function render(productArray) {
    const container = document.getElementById("lista");
    if (!productArray.length) {
        container.innerHTML = `<div class="no-results">🔍 No encontramos productos. Intenta con otra búsqueda o categoría.</div>`;
        return;
    }
    
    container.innerHTML = productArray.map(p => {
        let priceDisplay = typeof p.price === 'number' ? p.price + " CUP" : p.price + " CUP";
        let waMsg = `Quiero comprar ${p.name} (${priceDisplay})`;
        return `
            <div class="producto">
                <div class="image-container">
                    <img src="${p.img}" alt="${escapeHtml(p.name)}" loading="lazy" 
                         onerror="this.onerror=null; this.src='https://placehold.co/400x300/1e1e1e/ff9800?text=${encodeURIComponent(p.name.substring(0,15))}'">
                </div>
                <h3>${escapeHtml(p.name)}</h3>
                <p>${escapeHtml(priceDisplay)}</p>
                <small>${escapeHtml(p.cat)}</small>
                <a class="btn" href="https://wa.me/${p.wa}?text=${encodeURIComponent(waMsg)}" target="_blank" rel="noopener noreferrer">
                    <img src="whatsapp.png" alt="WhatsApp" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg'"> Comprar
                </a>
            </div>
        `;
    }).join("");
}

function applyFilters() {
    let searchTerm = document.getElementById("buscador").value.toLowerCase().trim();
    let filtered = productos.filter(p => {
        let catMatch = currentCategory === "Todos" || p.cat === currentCategory;
        let nameMatch = p.name.toLowerCase().includes(searchTerm);
        return catMatch && nameMatch;
    });
    render(filtered);
}

document.addEventListener("DOMContentLoaded", () => {
    loadButtons();
    applyFilters();
    document.getElementById("buscador").addEventListener("keyup", applyFilters);
});
</script>
</body>
</html>
