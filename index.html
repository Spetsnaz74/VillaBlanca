<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Inter', sans-serif;
    background:#111;
    color:white;
}

h1{
    text-align:center;
    padding:40px 0;
    background: url("Ventas.jpg") center/cover no-repeat;
    text-shadow:2px 2px 4px #000;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin: 0;
}

.search{
    display:flex;
    justify-content:center;
    padding:20px 10px;
}

.search input{
    padding:12px 15px;
    width:260px;
    border-radius:30px;
    border:none;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
}

.filters{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    padding:10px;
}

.filters button{
    padding:8px 16px;
    border:none;
    border-radius:30px;
    background:#222;
    color:white;
    cursor:pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    transition:0.2s;
}

.filters button:hover{
    background:#333;
    transform:scale(1.02);
}

.filters button.active{
    background:#ff9800;
    color:#111;
    font-weight: 600;
}

.productos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:20px;
    padding:20px;
    max-width:1400px;
    margin:0 auto;
}

.producto{
    background:#1a1a1a;
    padding:12px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
    border:1px solid #2a2a2a;
}

.producto:hover{
    transform:translateY(-5px);
    border-color:#ff9800;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.producto img{
    width:100%;
    height:200px;
    object-fit:contain;
    background:#111;
    border-radius:8px;
    transition:0.3s;
}

.producto:hover img{
    transform:scale(1.05);
}

.producto h3{
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    margin: 12px 0 5px;
    color: #fff;
    line-height: 1.3;
    min-height: 38px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.producto p{
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #ff9800;
    margin: 5px 0;
    background: rgba(255,152,0,0.1);
    display: inline-block;
    padding: 4px 12px;
    border-radius: 30px;
}

.producto small{
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: #aaa;
    background: #2a2a2a;
    padding: 4px 12px;
    border-radius: 30px;
    display: inline-block;
    margin: 8px 0 5px;
    letter-spacing: 0.3px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:10px;
    padding:10px 12px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-family: 'Inter', sans-serif;
    font-size:13px;
    font-weight:600;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.02);
    background:#20b859;
}

.btn img{
    width:18px;
    height:18px;
    background: transparent;
    mix-blend-mode: screen;
}

.mensaje-vacio{
    text-align:center;
    padding:60px 20px;
    color:#888;
    font-size: 18px;
    background:#1a1a1a;
    border-radius:20px;
    margin:20px;
    font-weight: 500;
}

@media (max-width: 480px){
    .productos{
        gap:12px;
        padding:12px;
    }
    .producto h3{
        font-size: 13px;
    }
    .producto p{
        font-size: 18px;
    }
    .mensaje-vacio{
        font-size: 16px;
        padding:40px 15px;
    }
}
</style>

// ✅ TODAS LAS CATEGORÍAS (las 7 requeridas)
const categories = ["Todos","Ferreteria","Electrónica","Cocina","Hogar","Ropa","Juguetes"];

// Función para cargar botones con estilo y manejo activo
function loadButtons(){
    const box = document.getElementById("categoryButtons");
    box.innerHTML = "";
    categories.forEach(c => {
        let btn = document.createElement("button");
        btn.textContent = c;
        btn.onclick = () => {
            currentCategory = c;
            applyFilters();
            // Actualizar clase activa en todos los botones
            document.querySelectorAll('.filters button').forEach(button => {
                button.classList.remove('active');
            });
            btn.classList.add('active');
        };
        box.appendChild(btn);
    });
    // Activar primer botón (Todos) por defecto
    const firstBtn = document.querySelector('.filters button');
    if(firstBtn) firstBtn.classList.add('active');
}

// Renderiza los productos o muestra el mensaje de categoría vacía (sin productos)
function render(data, categoryUsed){
    const contenedor = document.getElementById("lista");
    
    // Verificar si la categoría actual (excluyendo "Todos") no tiene productos propios
    // y además el array data está vacío después del filtro.
    if(data.length === 0){
        // Mostrar mensaje bonito centrado indicando que no hay productos en esta categoría
        contenedor.innerHTML = `<div class="mensaje-vacio">🛒 No hay productos en esta categoría aún</div>`;
        return;
    }
    
    // Si hay productos, mostrar grid normal
    contenedor.innerHTML = data.map(p => `
        <div class="producto">
            <img src="${p.img}" alt="${p.name}" onerror="this.src='https://placehold.co/200x200/222/white?text=No+Image'">
            <h3>${escapeHTML(p.name)}</h3>
            <p>${p.price} CUP</p>
            <small>${p.cat}</small><br>
            <a class="btn" href="https://wa.me/${p.wa}?text=Quiero%20comprar%20${encodeURIComponent(p.name)}">
                <img src="whatsapp.png" alt="WhatsApp" onerror="this.style.display='none'"> Comprar
            </a>
        </div>
    `).join("");
}

// Pequeña función para evitar XSS (por si algún nombre contiene caracteres raros)
function escapeHTML(str){
    return str.replace(/[&<>]/g, function(m){
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

// Filtrado principal según categoría y búsqueda
function applyFilters(){
    let searchTerm = document.getElementById("buscador").value.toLowerCase();
    
    let filtered = productos.filter(p => {
        // Filtro por categoría: si es "Todos" muestra todos, sino solo los que coinciden exactamente
        const matchCategory = (currentCategory === "Todos") || (p.cat === currentCategory);
        // Filtro por nombre (búsqueda)
        const matchSearch = p.name.toLowerCase().includes(searchTerm);
        return matchCategory && matchSearch;
    });
    
    // Al llamar a render pasamos también la categoría actual por si se necesita algún comportamiento extra,
    // pero render ya maneja el mensaje si filtered está vacío.
    render(filtered, currentCategory);
}
